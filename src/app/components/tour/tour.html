<div class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center animate-fade-in">

  <!-- Full-screen gradient bg matching current step -->
  <div class="absolute inset-0 bg-gradient-to-br transition-all duration-500"
       [class]="'bg-gradient-to-br ' + steps[currentStep()].gradient">
  </div>
  <!-- Noise/depth overlay -->
  <div class="absolute inset-0 bg-black/10"></div>

  <!-- Card -->
  <div class="relative w-full sm:max-w-md flex flex-col animate-slide-up safe-bottom">

    <!-- Skip link -->
    @if (currentStep() < steps.length - 1) {
      <div class="flex justify-end px-6 pt-safe-top pt-6 pb-2">
        <button (click)="skip()"
                class="text-white/60 font-semibold text-sm hover:text-white/90 transition-colors">
          Skip
        </button>
      </div>
    } @else {
      <div class="pt-10"></div>
    }

    <!-- Graphic -->
    <div class="flex flex-col items-center justify-center px-8 py-10 flex-1">
      <div class="w-28 h-28 rounded-[28px] bg-white/15 backdrop-blur-sm flex items-center justify-center mb-8 animate-bounce-slow shadow-[0_8px_32px_rgba(0,0,0,0.2)]">
        @if (steps[currentStep()].image === '✨') {
          <img src="assets/images/logo.png" alt="GeminiMuse logo" class="w-20 h-20 object-contain">
        } @else {
          <span class="text-6xl">{{ steps[currentStep()].image }}</span>
        }
      </div>

      <!-- Text -->
      <h2 class="text-3xl font-extrabold text-white text-center mb-4 tracking-tight leading-tight drop-shadow-sm">
        {{ steps[currentStep()].title }}
      </h2>
      <p class="text-white/75 text-base text-center leading-relaxed font-medium max-w-xs">
        {{ steps[currentStep()].description }}
      </p>
    </div>

    <!-- Bottom controls -->
    <div class="px-6 pb-8 flex flex-col gap-5">
      <!-- Progress dots -->
      <div class="flex justify-center gap-2" role="tablist" aria-label="Tour steps">
        @for (step of steps; track $index) {
          <div class="h-2 rounded-full transition-all duration-300 bg-white"
               [class.w-7]="$index === currentStep()"
               [class.opacity-100]="$index === currentStep()"
               [class.w-2]="$index !== currentStep()"
               [class.opacity-30]="$index !== currentStep()">
          </div>
        }
      </div>

      <!-- CTA -->
      <button (click)="next()"
              class="w-full h-14 rounded-[var(--radius-lg)] font-bold text-base tracking-wide transition-all active:scale-[0.98] shadow-[0_4px_20px_rgba(0,0,0,0.2)]"
              [style.background]="steps[currentStep()].accent"
              [style.color]="steps[currentStep()].accent === '#FFFFFF' ? '#111111' : '#111111'">
        {{ currentStep() === steps.length - 1 ? 'Start Exploring' : 'Next' }}
      </button>
    </div>

  </div>
</div>
