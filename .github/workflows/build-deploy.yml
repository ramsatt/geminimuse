name: Build and Deploy Gemini Muse Web App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Angular web app
      run: npm run build
      
    - name: Get build timestamp
      id: timestamp
      run: echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
      
    - name: Create build archive
      run: |
        cd dist/gemini-image-prompts/browser
        zip -r ../../../gemini-muse-build-${{ steps.timestamp.outputs.timestamp }}.zip .
        
    - name: Upload build as artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build-${{ steps.timestamp.outputs.timestamp }}
        path: gemini-muse-build-${{ steps.timestamp.outputs.timestamp }}.zip
        retention-days: 30
        
    - name: Deploy to FTP Server
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./dist/gemini-image-prompts/browser/
        server-dir: /public_html/gemini-muse/
        dangerous-clean-slate: false
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          
    - name: Create deployment info file
      run: |
        echo "Build Date: $(date)" > deployment-info.txt
        echo "Commit: ${{ github.sha }}" >> deployment-info.txt
        echo "Branch: ${{ github.ref_name }}" >> deployment-info.txt
        echo "Build Number: ${{ github.run_number }}" >> deployment-info.txt
        
    - name: Upload deployment info to FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        local-dir: ./
        server-dir: /public_html/gemini-muse/
        dangerous-clean-slate: false
        exclude: |
          **/*
          !deployment-info.txt
        
    - name: Notify deployment completion
      if: success()
      run: |
        echo "✅ Web app deployed successfully!"
        echo "Build timestamp: ${{ steps.timestamp.outputs.timestamp }}"
        echo "Deployed to FTP server at /public_html/gemini-muse/"
        echo "URL: https://your-domain.com/gemini-muse/"
