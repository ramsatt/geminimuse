name: Build and Deploy Gemini Muse Web App

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build Angular web app
      run: npm run build
      
    - name: Get build timestamp
      id: timestamp
      run: echo "timestamp=$(date +'%Y%m%d_%H%M%S')" >> $GITHUB_OUTPUT
      
    - name: Create build archive
      run: |
        cd dist/gemini-image-prompts/browser
        zip -r ../../../gemini-muse-build-${{ steps.timestamp.outputs.timestamp }}.zip .
        
    - name: Upload build as artifact
      uses: actions/upload-artifact@v4
      with:
        name: web-build-${{ steps.timestamp.outputs.timestamp }}
        path: gemini-muse-build-${{ steps.timestamp.outputs.timestamp }}.zip
        retention-days: 30
        
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp

    - name: Deploy via lftp
      run: |
        lftp -e "set ssl:verify-certificate no; \
        open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; \
        mirror -R --verbose --parallel=10 --ignore-time --only-newer ./dist/gemini-image-prompts/browser/assets/ /assets/; \
        mirror -R --verbose --parallel=10 --exclude assets/ ./dist/gemini-image-prompts/browser/ /; \
        quit"
        
    - name: Notify deployment completion
      if: success()
      run: |
        echo "✅ Web app deployed successfully!"
        echo "Build timestamp: ${{ steps.timestamp.outputs.timestamp }}"
        echo "Deployed to FTP server at /public_html/gemini-muse/"
        echo "URL: https://your-domain.com/gemini-muse/"
