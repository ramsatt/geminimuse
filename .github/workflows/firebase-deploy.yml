name: Deploy Firebase (Functions + Rules)

on:
  push:
    branches: [ main ]
    paths:
      - 'functions/**'
      - 'firestore.rules'
      - 'firestore.indexes.json'
      - 'firebase.json'
  workflow_dispatch:   # manual trigger

jobs:
  deploy-firebase:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install Cloud Functions dependencies
        working-directory: functions
        run: npm ci

      - name: Build Cloud Functions (TypeScript → JS)
        working-directory: functions
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules & indexes
        run: firebase deploy --only firestore --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive

      - name: Deploy Cloud Functions
        run: firebase deploy --only functions --token ${{ secrets.FIREBASE_TOKEN }} --non-interactive

      - name: Notify deployment completion
        if: success()
        run: |
          echo "✅ Firebase deployed successfully!"
          echo "Commit: ${{ github.sha }}"
          echo "Run:    ${{ github.run_number }}"
